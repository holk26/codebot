version: "3.8"

# ============================================
# GitHub AI Agent - Dokploy Optimized
# ============================================
# Dokploy handles:
#   - Reverse proxy (Traefik internally)
#   - SSL/TLS (Let's Encrypt automatically)
#   - Domain routing
#
# You only need to:
#   1. Deploy this compose file in Dokploy
#   2. Set the domain for nanobot-orchestrator in Dokploy UI
#   3. Configure GitHub webhook to the Dokploy domain
# ============================================

services:
  # ============================================
  # REDIS (Database - internal network)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: agent-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    command:
      - redis-server
      - --appendonly yes
      - --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
      - --bind 0.0.0.0
      - --protected-mode yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ============================================
  # NANOBOT ORCHESTRATOR (Public-facing)
  # ============================================
  # This is the ONLY service exposed to the internet.
  # Dokploy will handle SSL and domain routing automatically.
  # ============================================
  nanobot-orchestrator:
    build:
      context: .
      dockerfile: nanobot-orchestrator/Dockerfile
      args:
        - APP_USER=appuser
        - APP_UID=1000
    container_name: nanobot-orchestrator
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    # NOTE: read_only disabled for nanobot-orchestrator
    # because nanobot-ai needs to write memory, logs, and config at runtime.
    # Security is maintained via non-root user, dropped capabilities, and no-new-privileges.
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - OPCODE_API_URL=http://opencode-executor:8001
      - WORKSPACE_DIR=/workspace
      - WEBHOOK_PORT=8080
      - WEBHOOK_HOST=0.0.0.0
      - NANOBOT_CONFIG_PATH=/home/appuser/.nanobot/config.json
    volumes:
      - workspace_data:/workspace
      - nanobot_data:/home/appuser/.nanobot
      - ./nanobot-orchestrator/config:/app/config:ro
    depends_on:
      redis:
        condition: service_healthy
      opencode-executor:
        condition: service_started
    networks:
      - public
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================
  # OPENCODE EXECUTOR (Internal ONLY)
  # ============================================
  # CRITICAL: This service is NEVER exposed to the internet.
  # It only accepts connections from nanobot-orchestrator
  # via the internal network.
  # ============================================
  opencode-executor:
    build:
      context: .
      dockerfile: opencode-executor/Dockerfile
      args:
        - APP_USER=appuser
        - APP_UID=1000
    container_name: opencode-executor
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - WORKSPACE_DIR=/workspace
      - API_PORT=8001
      - API_HOST=0.0.0.0
    volumes:
      - workspace_data:/workspace
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    # NO ports exposed - internal network only
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  workspace_data:
    driver: local
  redis_data:
    driver: local
  nanobot_data:
    driver: local

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true
