version: "3.8"

# ============================================
# GitHub AI Agent - Dokploy Optimized
# ============================================
# Dokploy handles:
#   - Reverse proxy (Traefik internally)
#   - SSL/TLS (Let's Encrypt automatically)
#   - Domain routing
#
# You only need to:
#   1. Deploy this compose file in Dokploy
#   2. Set the domain for dashboard in Dokploy UI
#   3. Set the domain for nanobot-orchestrator in Dokploy UI (optional, for API)
#   4. Configure GitHub webhook to the nanobot domain
# ============================================

services:
  # ============================================
  # REDIS (Database - internal network)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: agent-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    command:
      - redis-server
      - --appendonly yes
      - --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
      - --bind 0.0.0.0
      - --protected-mode yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ============================================
  # DASHBOARD (React frontend)
  # ============================================
  # Serves the React dashboard via nginx.
  # Proxies /api and /health to nanobot-orchestrator.
  # ============================================
  dashboard:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: dashboard
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    ports:
      - "3000:3000"
    depends_on:
      - nanobot-orchestrator
    networks:
      - public
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================
  # NANOBOT ORCHESTRATOR (API + Webhook)
  # ============================================
  # Handles GitHub webhooks and dashboard API.
  # No static files - API only.
  # ============================================
  nanobot-orchestrator:
    build:
      context: .
      dockerfile: nanobot-orchestrator/Dockerfile
      args:
        - APP_USER=appuser
        - APP_UID=1000
    container_name: nanobot-orchestrator
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    ports:
      - "8080:8080"
      - "8081:8081"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - OPCODE_API_URL=http://opencode-executor:8001
      - WORKSPACE_DIR=/workspace
      - WEBHOOK_PORT=8080
      - WEBHOOK_HOST=0.0.0.0
      - NANOBOT_CONFIG_PATH=/home/appuser/.nanobot/config.json
      - NANOBOT_GATEWAY_PORT=8081
      - DASHBOARD_CORS_ORIGINS=${DASHBOARD_CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - workspace_data:/workspace
      - nanobot_data_v2:/home/appuser/.nanobot
      - ./nanobot-orchestrator/config:/app/config:ro
    depends_on:
      redis:
        condition: service_healthy
      opencode-executor:
        condition: service_started
    networks:
      - public
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================
  # OPENCODE EXECUTOR (Internal only)
  # ============================================
  # NOT exposed publicly - internal network only.
  # Accessed by nanobot-orchestrator via internal Docker network.
  # ============================================
  opencode-executor:
    build:
      context: .
      dockerfile: opencode-executor/Dockerfile
      args:
        - APP_USER=appuser
        - APP_UID=1000
    container_name: opencode-executor
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
    # NO ports exposed - internal network only
    env_file:
      - .env
    environment:
      - OPENCODE_LLM_API_KEY=${OPENCODE_LLM_API_KEY}
      - OPENCODE_LLM_MODEL=${OPENCODE_LLM_MODEL:-moonshotai/kimi-k2.6}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
    volumes:
      - workspace_data:/workspace
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u \"opencode:${OPENCODE_SERVER_PASSWORD}\" http://localhost:8001/global/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  workspace_data:
    driver: local
  redis_data:
    driver: local
  nanobot_data_v2:
    driver: local

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true
